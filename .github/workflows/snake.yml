name: Generate Snake

on:
schedule:
# Her gün Türkiye saatiyle gece 00.00'da çalışır
# GitHub cron saatleri UTC'dir. 21.00 UTC = 00.00 Türkiye
- cron: "0 21 * * *"

# Actions sayfasından elle çalıştırabilmek için

workflow_dispatch:

# main veya master branch'ine commit gelince çalışır

push:
branches:
- main
- master

permissions:
contents: write

jobs:
generate:
runs-on: ubuntu-latest
timeout-minutes: 5

```
steps:
  - name: Generate Snake Animation
    uses: Platane/snk/svg-only@v3
    with:
      github_user_name: ${{ github.repository_owner }}
      outputs: |
        dist/github-contribution-grid-snake.svg
        dist/github-contribution-grid-snake-dark.svg?palette=github-dark

  - name: Push Snake Files to Output Branch
    uses: crazy-max/ghaction-github-pages@v5
    with:
      target_branch: output
      build_dir: dist
    env:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```
